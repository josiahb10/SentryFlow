<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentryFlow Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-warning">SentryFlow: Enterprise PII Incident Dashboard</h1>
        <p class="lead">Automated detection of unauthorized PII access in corporate logs.</p>
        
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover mt-3">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Employee ID</th>
                        <th>Department</th>
                        <th>Violation Type</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in incidents %}
                    <tr>
                        <td>{{ row[0] }}</td> <td>{{ row[1] }}</td> <td>{{ row[2] }}</td> <td><span class="badge bg-danger">{{ row[3] }}</span></td> </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
